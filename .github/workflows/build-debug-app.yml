name: Build Debug App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Always install — no lock file means npm generates one fresh
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env
        run: |
          echo "EXPO_PUBLIC_CONVEX_URL=https://majestic-fennec-666.eu-west-1.convex.cloud" > .env

      - name: Ensure assets exist
        run: |
          mkdir -p assets
          python3 - <<'PYEOF'
          import struct, zlib, os

          def make_dark_png(path, w=1024, h=1024, color=(16,16,16)):
              if os.path.exists(path):
                  return
              def chunk(name, data):
                  c = struct.pack('>I', len(data)) + name + data
                  return c + struct.pack('>I', zlib.crc32(name + data) & 0xffffffff)
              r, g, b = color
              sig  = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
              raw  = b''.join(b'\x00' + bytes([r,g,b] * w) for _ in range(h))
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              with open(path, 'wb') as f:
                  f.write(sig + ihdr + idat + iend)

          make_dark_png('assets/icon.png')
          make_dark_png('assets/adaptive-icon.png')
          make_dark_png('assets/splash.png')
          make_dark_png('assets/favicon.png', 64, 64)
          PYEOF

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_CONVEX_URL: https://majestic-fennec-666.eu-west-1.convex.cloud

      - name: Bundle JavaScript
        run: |
          mkdir -p android/app/src/main/assets
          node node_modules/@expo/cli/build/bin/cli export:embed \
            --platform android \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --dev false
        env:
          NODE_ENV: production
          EXPO_PUBLIC_CONVEX_URL: https://majestic-fennec-666.eu-west-1.convex.cloud

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --build-cache \
            --gradle-user-home ~/.gradle
        env:
          EXPO_PUBLIC_CONVEX_URL: https://majestic-fennec-666.eu-west-1.convex.cloud
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.workers.max=4 -Dkotlin.incremental=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zipsender-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error
