name: CI / CD

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release:
        description: "Build a release APK (signed)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

# Cancel stale runs when a new commit is pushed to the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default — individual jobs elevate only what they need
permissions:
  contents: read

# ─────────────────────────────────────────────────────────────────────────────
# Shared env
# ─────────────────────────────────────────────────────────────────────────────
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24"
  JAVA_VERSION: "17"
  CONVEX_URL: "https://majestic-fennec-666.eu-west-1.convex.cloud"

# ─────────────────────────────────────────────────────────────────────────────
# Jobs
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── 1. Type-check & lint ───────────────────────────────────────────────────
  lint:
    name: Type-check & Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Install convex backend dependencies
        working-directory: convex
        run: npm install --legacy-peer-deps

      - name: Generate Convex types
        working-directory: convex
        run: npx convex codegen --typecheck disable
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Copy _generated to app-expected path
        # App imports from <root>/convex/_generated/ but codegen writes to
        # <root>/convex/convex/_generated/ — bridge the gap for tsc.
        run: cp -r convex/convex/_generated convex/_generated

      - name: TypeScript type-check (app)
        run: npx tsc --noEmit --skipLibCheck

      - name: TypeScript type-check (convex backend)
        working-directory: convex
        run: npx tsc --noEmit --skipLibCheck

      - name: Expo lint
        # expo lint forwards args after `--` to ESLint; --max-warnings is an ESLint flag,
        # not an expo-lint flag, so it must be passed through the -- boundary.
        # `npm run lint -- -- --max-warnings 0` becomes `expo lint -- --max-warnings 0`
        run: npm run lint -- -- --max-warnings 0

  # ── 2. Unit tests ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm test -- --ci --reporters=default --reporters=jest-junit --passWithNoTests
        env:
          JEST_JUNIT_OUTPUT_DIR: ./reports
          JEST_JUNIT_OUTPUT_NAME: unit-tests.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: unit-test-results-${{ github.run_number }}
          path: reports/unit-tests.xml
          retention-days: 14
          if-no-files-found: warn

  # ── 3. Debug APK build ────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: test
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@7a6d8a8234af8eb533c6dcb94f3c0cba2c236b36 # v4.7.1
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env
        run: echo "EXPO_PUBLIC_CONVEX_URL=${{ env.CONVEX_URL }}" > .env

      - name: Ensure placeholder assets
        run: |
          mkdir -p assets
          python3 - <<'PYEOF'
          import struct, zlib, os

          def make_dark_png(path, w=1024, h=1024, color=(16,16,16)):
              if os.path.exists(path) and os.path.getsize(path) > 100:
                  return
              def chunk(name, data):
                  c = struct.pack('>I', len(data)) + name + data
                  return c + struct.pack('>I', zlib.crc32(name + data) & 0xffffffff)
              r, g, b = color
              sig  = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
              raw  = b''.join(b'\x00' + bytes([r,g,b] * w) for _ in range(h))
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              with open(path, 'wb') as f:
                  f.write(sig + ihdr + idat + iend)

          make_dark_png('assets/icon.png')
          make_dark_png('assets/adaptive-icon.png')
          make_dark_png('assets/splash.png')
          make_dark_png('assets/favicon.png', 64, 64)
          PYEOF

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ env.CONVEX_URL }}

      - name: Bundle JavaScript
        run: |
          mkdir -p android/app/src/main/assets
          node node_modules/@expo/cli/build/bin/cli export:embed \
            --platform android \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --dev false
        env:
          NODE_ENV: production
          EXPO_PUBLIC_CONVEX_URL: ${{ env.CONVEX_URL }}

      - name: Cache Gradle
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --build-cache \
            --stacktrace \
            --gradle-user-home ~/.gradle
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ env.CONVEX_URL }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.workers.max=4 -Dkotlin.incremental=false"

      - name: Upload debug APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: zipsender-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error

  # ── 4. Release APK build (signed) ────────────────────────────────────────
  build-release:
    name: Build Release APK (Signed)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: test
    permissions:
      contents: write # required for softprops/action-gh-release to create releases
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event.inputs.release == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@7a6d8a8234af8eb533c6dcb94f3c0cba2c236b36 # v4.7.1
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env
        run: echo "EXPO_PUBLIC_CONVEX_URL=${{ env.CONVEX_URL }}" > .env

      - name: Ensure placeholder assets
        run: |
          mkdir -p assets
          python3 - <<'PYEOF'
          import struct, zlib, os

          def make_dark_png(path, w=1024, h=1024, color=(16,16,16)):
              if os.path.exists(path) and os.path.getsize(path) > 100:
                  return
              def chunk(name, data):
                  c = struct.pack('>I', len(data)) + name + data
                  return c + struct.pack('>I', zlib.crc32(name + data) & 0xffffffff)
              r, g, b = color
              sig  = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
              raw  = b''.join(b'\x00' + bytes([r,g,b] * w) for _ in range(h))
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              with open(path, 'wb') as f:
                  f.write(sig + ihdr + idat + iend)

          make_dark_png('assets/icon.png')
          make_dark_png('assets/adaptive-icon.png')
          make_dark_png('assets/splash.png')
          make_dark_png('assets/favicon.png', 64, 64)
          PYEOF

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ env.CONVEX_URL }}

      - name: Bundle JavaScript
        run: |
          mkdir -p android/app/src/main/assets
          node node_modules/@expo/cli/build/bin/cli export:embed \
            --platform android \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --dev false
        env:
          NODE_ENV: production
          EXPO_PUBLIC_CONVEX_URL: ${{ env.CONVEX_URL }}

      - name: Decode keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/app/release.jks
            echo "Keystore decoded."
          else
            echo "ANDROID_KEYSTORE_BASE64 not set — skipping keystore decode."
          fi
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Cache Gradle
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --build-cache \
            --stacktrace \
            --gradle-user-home ~/.gradle
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ env.CONVEX_URL }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.workers.max=4 -Dkotlin.incremental=false"
          ANDROID_KEYSTORE_PATH: release.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload release APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: zipsender-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267f # v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: "ZipSender ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 5. Notify on failure ──────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [lint, test, build-debug, build-release]
    if: failure()

    steps:
      - name: Post failure summary
        run: |
          echo "## ❌ CI Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more jobs failed on **${{ github.ref_name }}** (run #${{ github.run_number }})." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
