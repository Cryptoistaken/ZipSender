name: CI / CD

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release:
        description: "Build a release APK (signed)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

# Cancel stale runs when a new commit is pushed to the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default — individual jobs elevate only what they need
permissions:
  contents: read

# ─────────────────────────────────────────────────────────────────────────────
# Shared env
# ─────────────────────────────────────────────────────────────────────────────
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24"
  JAVA_VERSION: "17"
  CONVEX_URL: "https://majestic-fennec-666.eu-west-1.convex.cloud"

# ─────────────────────────────────────────────────────────────────────────────
# Jobs
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── 1. Type-check & lint ───────────────────────────────────────────────────
  lint:
    name: Type-check & Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Install ESLint
        run: npm install --no-save --legacy-peer-deps eslint@8 eslint-config-expo

      - name: Create ESLint config
        run: |
          cat > .eslintrc.js << 'ESLINT'
          module.exports = {
            extends: ['expo'],
            ignorePatterns: ['Scripts/', 'convex/', 'android/', 'node_modules/'],
          };
          ESLINT

      - name: Install convex backend dependencies
        working-directory: convex
        run: npm install --legacy-peer-deps

      - name: Generate Convex types
        working-directory: convex
        run: npx convex codegen --typecheck disable
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Copy _generated to app-expected path
        run: cp -r convex/convex/_generated convex/_generated

      - name: TypeScript type-check (app)
        run: npx tsc --noEmit --skipLibCheck

      - name: TypeScript type-check (convex backend)
        working-directory: convex
        run: npx tsc --noEmit --skipLibCheck

      - name: Lint
        run: ./node_modules/.bin/eslint --ext .js,.jsx,.ts,.tsx --max-warnings 0 app components hooks store constants

  # ── 2. Unit tests ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm test -- --ci --reporters=default --reporters=jest-junit --passWithNoTests
        env:
          JEST_JUNIT_OUTPUT_DIR: ./reports
          JEST_JUNIT_OUTPUT_NAME: unit-tests.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ github.run_number }}
          path: reports/unit-tests.xml
          retention-days: 14
          if-no-files-found: warn

  # ── 3. Debug APK build ────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: test
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env
        run: echo "EXPO_PUBLIC_CONVEX_URL=${{ env.CONVEX_URL }}" > .env

      - name: Ensure placeholder assets
        run: |
          mkdir -p assets
          python3 - <<'PYEOF'
          import struct, zlib, os

          def make_dark_png(path, w=1024, h=1024, color=(16,16,16)):
              if os.path.exists(path) and os.path.getsize(path) > 100:
                  return
              def chunk(name, data):
                  c = struct.pack('>I', len(data)) + name + data
                  return c + struct.pack('>I', zlib.crc32(name + data) & 0xffffffff)
              r, g, b = color
              sig  = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
              raw  = b''.join(b'\x00' + bytes([r,g,b] * w) for _ in range(h))
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              with open(path, 'wb') as f:
                  f.write(sig + ihdr + idat + iend)

          make_dark_png('assets/icon.png')
          make_dark_png('assets/adaptive-icon.png')
          make_dark_png('assets/splash.png')
          make_dark_png('assets/favicon.png', 64, 64)
          PYEOF

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ env.CONVEX_URL }}

      - name: Bundle JavaScript
        run: |
          mkdir -p android/app/src/main/assets
          node node_modules/@expo/cli/build/bin/cli export:embed \
            --platform android \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --dev false
        env:
          NODE_ENV: production
          EXPO_PUBLIC_CONVEX_URL: ${{ env.CONVEX_URL }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --build-cache \
            --stacktrace \
            --gradle-user-home ~/.gradle
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ env.CONVEX_URL }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.workers.max=4 -Dkotlin.incremental=false"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: zipsender-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error

  # ── 4. Release APK build (auto-signed) ───────────────────────────────────
  build-release:
    name: Build Release APK
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: test
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env
        run: echo "EXPO_PUBLIC_CONVEX_URL=${{ env.CONVEX_URL }}" > .env

      - name: Ensure placeholder assets
        run: |
          mkdir -p assets
          python3 - <<'PYEOF'
          import struct, zlib, os

          def make_dark_png(path, w=1024, h=1024, color=(16,16,16)):
              if os.path.exists(path) and os.path.getsize(path) > 100:
                  return
              def chunk(name, data):
                  c = struct.pack('>I', len(data)) + name + data
                  return c + struct.pack('>I', zlib.crc32(name + data) & 0xffffffff)
              r, g, b = color
              sig  = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
              raw  = b''.join(b'\x00' + bytes([r,g,b] * w) for _ in range(h))
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              with open(path, 'wb') as f:
                  f.write(sig + ihdr + idat + iend)

          make_dark_png('assets/icon.png')
          make_dark_png('assets/adaptive-icon.png')
          make_dark_png('assets/splash.png')
          make_dark_png('assets/favicon.png', 64, 64)
          PYEOF

      - name: Expo prebuild (Android)
        # Must run BEFORE keytool so android/app/ directory exists
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ env.CONVEX_URL }}

      - name: Generate keystore (auto — new each run, fine for internal use)
        # android/app/ now exists after prebuild above
        run: |
          keytool -genkeypair \
            -keystore android/app/release.jks \
            -alias zipsender \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass zipsender123 \
            -keypass zipsender123 \
            -dname "CN=ZipSender, OU=Family, O=ZipSender, L=Unknown, ST=Unknown, C=US" \
            -noprompt

      - name: Inject signing config into build.gradle
        run: |
          python3 - <<'PYEOF'
          import re

          path = 'android/app/build.gradle'
          text = open(path).read()

          signing_configs = """
              signingConfigs {
                  release {
                      storeFile file(System.getenv("ANDROID_KEYSTORE_PATH") ?: "release.jks")
                      storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
          """

          if 'signingConfigs' not in text:
              text = text.replace('    buildTypes {', signing_configs + '    buildTypes {', 1)

          text = re.sub(
              r'(release\s*\{)',
              r'\1\n            signingConfig signingConfigs.release',
              text,
              count=1
          )

          open(path, 'w').write(text)
          print("build.gradle patched with signing config.")
          PYEOF

      - name: Bundle JavaScript
        run: |
          mkdir -p android/app/src/main/assets
          node node_modules/@expo/cli/build/bin/cli export:embed \
            --platform android \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --dev false
        env:
          NODE_ENV: production
          EXPO_PUBLIC_CONVEX_URL: ${{ env.CONVEX_URL }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --build-cache \
            --stacktrace \
            --gradle-user-home ~/.gradle
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ env.CONVEX_URL }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.workers.max=4 -Dkotlin.incremental=false"
          ANDROID_KEYSTORE_PATH: release.jks
          ANDROID_KEY_ALIAS: zipsender
          ANDROID_KEYSTORE_PASSWORD: zipsender123
          ANDROID_KEY_PASSWORD: zipsender123

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: zipsender-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: "ZipSender ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 5. Notify on failure ──────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [lint, test, build-debug, build-release]
    if: failure()

    steps:
      - name: Post failure summary
        run: |
          echo "## ❌ CI Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more jobs failed on **${{ github.ref_name }}** (run #${{ github.run_number }})." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
