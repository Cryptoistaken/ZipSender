name: CI / CD

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release:
        description: "Build a release APK (signed)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ─────────────────────────────────────────────────────────────────────────────
# Shared env
# ─────────────────────────────────────────────────────────────────────────────
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24"
  JAVA_VERSION: "17"
  CONVEX_URL: "https://majestic-fennec-666.eu-west-1.convex.cloud"
  KS_PASS: "zipsender123"
  KS_ALIAS: "zipsender"

# ─────────────────────────────────────────────────────────────────────────────
# Jobs
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── 1. Type-check & lint ───────────────────────────────────────────────────
  lint:
    name: Type-check & Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Install ESLint
        run: npm install --no-save --legacy-peer-deps eslint@8 eslint-config-expo

      - name: Create ESLint config
        run: |
          cat > .eslintrc.js << 'ESLINT'
          module.exports = {
            extends: ['expo'],
            ignorePatterns: ['Scripts/', 'convex/', 'android/', 'node_modules/'],
          };
          ESLINT

      - name: Install convex backend dependencies
        working-directory: convex
        run: npm install --legacy-peer-deps

      - name: Generate Convex types
        working-directory: convex
        run: npx convex codegen --typecheck disable
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Copy _generated to app-expected path
        run: cp -r convex/convex/_generated convex/_generated

      - name: TypeScript type-check (app)
        run: npx tsc --noEmit --skipLibCheck

      - name: TypeScript type-check (convex backend)
        working-directory: convex
        run: npx tsc --noEmit --skipLibCheck

      - name: Lint
        run: ./node_modules/.bin/eslint --ext .js,.jsx,.ts,.tsx --max-warnings 0 app components hooks store constants

  # ── 2. Unit tests ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm test -- --ci --reporters=default --reporters=jest-junit --passWithNoTests
        env:
          JEST_JUNIT_OUTPUT_DIR: ./reports
          JEST_JUNIT_OUTPUT_NAME: unit-tests.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ github.run_number }}
          path: reports/unit-tests.xml
          retention-days: 14
          if-no-files-found: warn

  # ── 3. Debug APK build ────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: test
    if: false  # disabled

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env
        run: echo "EXPO_PUBLIC_CONVEX_URL=${{ env.CONVEX_URL }}" > .env

      - name: Ensure placeholder assets
        run: |
          mkdir -p assets
          python3 - <<'PYEOF'
          import struct, zlib, os
          def make_png(path, w=1024, h=1024, color=(16,16,16)):
              if os.path.exists(path) and os.path.getsize(path) > 100:
                  return
              def chunk(name, data):
                  c = struct.pack('>I', len(data)) + name + data
                  return c + struct.pack('>I', zlib.crc32(name + data) & 0xffffffff)
              r,g,b = color
              sig  = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
              raw  = b''.join(b'\x00' + bytes([r,g,b]*w) for _ in range(h))
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              with open(path,'wb') as f: f.write(sig+ihdr+idat+iend)
          make_png('assets/icon.png')
          make_png('assets/adaptive-icon.png')
          make_png('assets/splash.png')
          make_png('assets/favicon.png', 64, 64)
          PYEOF

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ env.CONVEX_URL }}

      - name: Bundle JavaScript
        run: |
          mkdir -p android/app/src/main/assets
          node node_modules/@expo/cli/build/bin/cli export:embed \
            --platform android \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --dev false
        env:
          NODE_ENV: production
          EXPO_PUBLIC_CONVEX_URL: ${{ env.CONVEX_URL }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --build-cache \
            --stacktrace \
            --gradle-user-home ~/.gradle
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ env.CONVEX_URL }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.workers.max=4 -Dkotlin.incremental=false"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: zipsender-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error

  # ── 4. Release APK build (auto-signed) ────────────────────────────────────
  build-release:
    name: Build Release APK
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: test
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env
        run: echo "EXPO_PUBLIC_CONVEX_URL=${{ env.CONVEX_URL }}" > .env

      - name: Ensure placeholder assets
        run: |
          mkdir -p assets
          python3 - <<'PYEOF'
          import struct, zlib, os
          def make_png(path, w=1024, h=1024, color=(16,16,16)):
              if os.path.exists(path) and os.path.getsize(path) > 100:
                  return
              def chunk(name, data):
                  c = struct.pack('>I', len(data)) + name + data
                  return c + struct.pack('>I', zlib.crc32(name + data) & 0xffffffff)
              r,g,b = color
              sig  = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
              raw  = b''.join(b'\x00' + bytes([r,g,b]*w) for _ in range(h))
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              with open(path,'wb') as f: f.write(sig+ihdr+idat+iend)
          make_png('assets/icon.png')
          make_png('assets/adaptive-icon.png')
          make_png('assets/splash.png')
          make_png('assets/favicon.png', 64, 64)
          PYEOF

      - name: Expo prebuild (Android)
        # prebuild must run BEFORE keytool — it creates android/app/
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ env.CONVEX_URL }}

      - name: Generate keystore
        # android/app/ now exists — safe to write keystore here
        run: |
          keytool -genkeypair \
            -keystore android/app/release.jks \
            -alias "${{ env.KS_ALIAS }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ env.KS_PASS }}" \
            -keypass "${{ env.KS_PASS }}" \
            -dname "CN=ZipSender, OU=Family, O=ZipSender, L=Unknown, ST=Unknown, C=US" \
            -noprompt

      - name: Inject signing config into app/build.gradle
        # Expo 52 / RN 0.76 generates build.gradle with a 'release' buildType block.
        # We append a signingConfigs block and wire it in using gradle.properties values
        # so no regex is needed to find the exact insertion point inside buildTypes.
        run: |
          # Write signing credentials to gradle.properties (read by build.gradle below)
          cat >> android/gradle.properties << 'EOF'
          ZIPSENDER_STORE_FILE=release.jks
          ZIPSENDER_STORE_PASSWORD=zipsender123
          ZIPSENDER_KEY_ALIAS=zipsender
          ZIPSENDER_KEY_PASSWORD=zipsender123
          EOF

          # Append a signing config + wire it into the release buildType via a
          # second android{} block — Gradle merges multiple android{} blocks, so
          # this is safe and avoids touching the prebuild-generated content at all.
          cat >> android/app/build.gradle << 'GRADLE'

          // ── Release signing (added by CI) ──────────────────────────────────
          android {
              signingConfigs {
                  release {
                      storeFile file(ZIPSENDER_STORE_FILE)
                      storePassword ZIPSENDER_STORE_PASSWORD
                      keyAlias ZIPSENDER_KEY_ALIAS
                      keyPassword ZIPSENDER_KEY_PASSWORD
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          GRADLE

      - name: Bundle JavaScript
        run: |
          mkdir -p android/app/src/main/assets
          node node_modules/@expo/cli/build/bin/cli export:embed \
            --platform android \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --dev false
        env:
          NODE_ENV: production
          EXPO_PUBLIC_CONVEX_URL: ${{ env.CONVEX_URL }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --build-cache \
            --stacktrace \
            --gradle-user-home ~/.gradle
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ env.CONVEX_URL }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.workers.max=4 -Dkotlin.incremental=false"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: zipsender-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: "ZipSender ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 5. Notify on failure ───────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [lint, test, build-release]
    if: failure()

    steps:
      - name: Post failure summary
        run: |
          echo "## ❌ CI Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more jobs failed on **${{ github.ref_name }}** (run #${{ github.run_number }})." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
